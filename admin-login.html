<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REVIVE — Clinician Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Didact+Gothic&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:   #0d1520;
    --cream:  #fbf3da;
    --copper: #b87333;
    --tan:    #bd9468;
    --dim:    rgba(251,243,218,0.45);
    --line:   rgba(184,115,51,0.22);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--navy); color: var(--cream); font-family: 'Didact Gothic', sans-serif; }
  .page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
  .card { width: 100%; max-width: 420px; background: rgba(15,22,35,0.95); border: 1px solid var(--line); border-radius: 2px; padding: 48px 40px; display: flex; flex-direction: column; gap: 28px; }
  .brand { text-align: center; }
  .brand-logo { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; letter-spacing: 0.3em; color: var(--copper); text-transform: uppercase; text-decoration: none; display: block; }
  .brand-tag { font-size: 0.55rem; letter-spacing: 0.4em; color: var(--dim); text-transform: uppercase; margin-top: 6px; }
  .clinician-badge { text-align: center; background: rgba(184,115,51,0.08); border: 1px solid rgba(184,115,51,0.25); border-radius: 2px; padding: 8px 16px; font-size: 0.58rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--copper); }
  .card-head { text-align: center; }
  .card-title { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 300; color: var(--cream); }
  .card-sub { font-size: 0.65rem; color: var(--dim); margin-top: 8px; line-height: 1.7; letter-spacing: 0.05em; }
  .fields { display: flex; flex-direction: column; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field label { font-size: 0.58rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--dim); }
  .field input { background: rgba(255,255,255,0.04); border: 1px solid var(--line); border-radius: 2px; padding: 13px 16px; color: var(--cream); font-family: 'Didact Gothic', sans-serif; font-size: 0.82rem; outline: none; transition: border-color 0.2s; width: 100%; }
  .field input:focus { border-color: var(--copper); }
  .field input::placeholder { color: rgba(251,243,218,0.2); }
  .btn-submit { width: 100%; padding: 16px; background: var(--copper); border: none; color: var(--navy); font-family: 'Didact Gothic', sans-serif; font-size: 0.72rem; letter-spacing: 0.25em; text-transform: uppercase; cursor: pointer; border-radius: 1px; transition: all 0.25s; }
  .btn-submit:hover { background: var(--tan); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-msg { font-size: 0.68rem; color: #e05555; text-align: center; min-height: 20px; letter-spacing: 0.05em; }
  .copper-line { height: 1px; background: linear-gradient(90deg, transparent, var(--copper), transparent); opacity: 0.2; }
  .patient-link { text-align: center; font-size: 0.62rem; color: var(--dim); letter-spacing: 0.08em; }
  .patient-link a { color: var(--copper); text-decoration: none; }
</style>
</head>
<body>
<div class="page">
  <div class="card">
    <div class="brand">
      <a href="index.html" class="brand-logo">Revive</a>
      <div class="brand-tag">Hormone Optimisation Clinic</div>
    </div>
    <div class="clinician-badge">Clinician Portal</div>
    <div class="copper-line"></div>
    <div class="card-head">
      <div class="card-title">Clinician Access</div>
      <p class="card-sub">Restricted access. Authorised clinical staff only.</p>
    </div>
    <div class="fields">
      <div class="field">
        <label>Clinician Email</label>
        <input type="email" id="emailInput" placeholder="clinician@revive.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="passwordInput" placeholder="Your password" autocomplete="current-password">
      </div>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <button class="btn-submit" id="submitBtn" onclick="handleLogin()">Access Clinician Portal</button>
    <div class="patient-link">Patient? <a href="login.html">Sign in here</a></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyBKufRSWf3oS4wA0UIlJE8kr0yrQClWzuY",
    authDomain: "revive-clinic-885e7.firebaseapp.com",
    projectId: "revive-clinic-885e7",
    storageBucket: "revive-clinic-885e7.firebasestorage.app",
    messagingSenderId: "1075531492371",
    appId: "1:1075531492371:web:64ef54b11f47401be063e6"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.handleLogin = async function() {
    const email    = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const errEl    = document.getElementById('errorMsg');
    const btn      = document.getElementById('submitBtn');

    errEl.textContent = '';
    if (!email || !password) return errEl.textContent = 'Please enter your credentials.';

    btn.disabled = true;
    btn.textContent = 'Verifying…';

    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);

      // Must be in admins collection
      const adminDoc = await getDoc(doc(db, 'admins', cred.user.uid));
      if (!adminDoc.exists()) {
        await auth.signOut();
        btn.disabled = false;
        btn.textContent = 'Access Clinician Portal';
        return errEl.textContent = 'Access denied. This portal is for authorised clinicians only.';
      }

      window.location.href = 'admin.html';
    } catch(err) {
      btn.disabled = false;
      btn.textContent = 'Access Clinician Portal';
      if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
        errEl.textContent = 'Incorrect credentials.';
      } else {
        errEl.textContent = err.message;
      }
    }
  };

  document.addEventListener('keydown', e => { if (e.key === 'Enter') window.handleLogin(); });
</script>
</body>
</html>
