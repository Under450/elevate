<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REVIVE — Create Your Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Didact+Gothic&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:   #111d2b;
    --cream:  #fbf3da;
    --copper: #b87333;
    --tan:    #bd9468;
    --dim:    rgba(251,243,218,0.45);
    --line:   rgba(184,115,51,0.22);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--navy); color: var(--cream); font-family: 'Didact Gothic', sans-serif; }

  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  .card {
    width: 100%;
    max-width: 480px;
    background: rgba(22,32,48,0.8);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 48px 40px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .brand {
    text-align: center;
  }
  .brand-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    color: var(--copper);
    text-transform: uppercase;
    text-decoration: none;
    display: block;
  }
  .brand-tag {
    font-size: 0.58rem;
    letter-spacing: 0.35em;
    color: var(--dim);
    text-transform: uppercase;
    margin-top: 6px;
  }

  .card-head { text-align: center; }
  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 300;
    color: var(--cream);
  }
  .card-title em { font-style: italic; color: var(--tan); }
  .card-sub {
    font-size: 0.68rem;
    color: var(--dim);
    margin-top: 8px;
    line-height: 1.7;
    letter-spacing: 0.05em;
  }

  .results-banner {
    background: rgba(184,115,51,0.08);
    border: 1px solid rgba(184,115,51,0.3);
    border-radius: 2px;
    padding: 14px 16px;
    font-size: 0.7rem;
    color: var(--tan);
    letter-spacing: 0.08em;
    text-align: center;
    display: none;
  }
  .results-banner.show { display: block; }

  .field { display: flex; flex-direction: column; gap: 8px; }
  .field label {
    font-size: 0.58rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--dim);
  }
  .field input {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 13px 16px;
    color: var(--cream);
    font-family: 'Didact Gothic', sans-serif;
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .field input:focus { border-color: var(--copper); }
  .field input::placeholder { color: rgba(251,243,218,0.2); }

  .fields { display: flex; flex-direction: column; gap: 16px; }

  .btn-submit {
    width: 100%;
    padding: 16px;
    background: var(--copper);
    border: none;
    color: var(--navy);
    font-family: 'Didact Gothic', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.25s;
    margin-top: 4px;
  }
  .btn-submit:hover { background: var(--tan); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  .error-msg {
    font-size: 0.68rem;
    color: #e05555;
    text-align: center;
    min-height: 20px;
    letter-spacing: 0.05em;
  }

  .login-link {
    text-align: center;
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.1em;
  }
  .login-link a { color: var(--copper); text-decoration: none; }
  .login-link a:hover { color: var(--tan); }

  .copper-line {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--copper), transparent);
    opacity: 0.2;
  }
</style>
</head>
<body>
<div class="page">
  <div class="card">

    <div class="brand">
      <a href="index.html" class="brand-logo">Revive</a>
      <div class="brand-tag">Hormone Optimisation Clinic</div>
    </div>

    <div class="copper-line"></div>

    <div class="card-head">
      <div class="card-title">Create your <em>account</em></div>
      <p class="card-sub">Your assessment results are ready. Create your account to view your personalised report and access your dashboard.</p>
    </div>

    <div class="results-banner" id="resultsBanner">
      ✓ Assessment complete — your results will load in your dashboard
    </div>

    <div class="fields">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="nameInput" placeholder="Your full name" autocomplete="name">
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="emailInput" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="passwordInput" placeholder="Minimum 8 characters" autocomplete="new-password">
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirmInput" placeholder="Repeat password" autocomplete="new-password">
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="btn-submit" id="submitBtn" onclick="handleSignup()">Create Account &amp; View Results</button>

    <div class="login-link">Already have an account? <a href="login.html">Sign in</a></div>

  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, createUserWithEmailAndPassword, updateProfile } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyBKufRSWf3oS4wA0UIlJE8kr0yrQClWzuY",
    authDomain: "revive-clinic-885e7.firebaseapp.com",
    projectId: "revive-clinic-885e7",
    storageBucket: "revive-clinic-885e7.firebasestorage.app",
    messagingSenderId: "1075531492371",
    appId: "1:1075531492371:web:64ef54b11f47401be063e6"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Show banner if assessment results exist in sessionStorage
  const savedResults = sessionStorage.getItem('revive_assessment');
  if (savedResults) {
    document.getElementById('resultsBanner').classList.add('show');
  }

  window.handleSignup = async function() {
    const name     = document.getElementById('nameInput').value.trim();
    const email    = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const confirm  = document.getElementById('confirmInput').value;
    const errEl    = document.getElementById('errorMsg');
    const btn      = document.getElementById('submitBtn');

    errEl.textContent = '';

    if (!name)                        return errEl.textContent = 'Please enter your full name.';
    if (!email)                       return errEl.textContent = 'Please enter your email address.';
    if (password.length < 8)          return errEl.textContent = 'Password must be at least 8 characters.';
    if (password !== confirm)         return errEl.textContent = 'Passwords do not match.';

    btn.disabled = true;
    btn.textContent = 'Creating account…';

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: name });

      // Parse assessment results from sessionStorage
      let assessment = null;
      try { assessment = JSON.parse(savedResults); } catch(e) {}

      // Save patient profile to Firestore
      await setDoc(doc(db, 'patients', cred.user.uid), {
        uid: cred.user.uid,
        name,
        email,
        role: 'patient',
        createdAt: serverTimestamp(),
        assessment: assessment || null,
        plan: null,
        protocol: null,
      });

      // Clear sessionStorage results (now saved to Firestore)
      sessionStorage.removeItem('revive_assessment');

      // Redirect to dashboard
      window.location.href = 'dashboard.html';
    } catch(err) {
      btn.disabled = false;
      btn.textContent = 'Create Account & View Results';
      if (err.code === 'auth/email-already-in-use') {
        errEl.textContent = 'An account with this email already exists. Sign in instead.';
      } else if (err.code === 'auth/invalid-email') {
        errEl.textContent = 'Please enter a valid email address.';
      } else {
        errEl.textContent = err.message;
      }
    }
  };

  // Enter key submits
  document.addEventListener('keydown', e => { if (e.key === 'Enter') window.handleSignup(); });
</script>
</body>
</html>
